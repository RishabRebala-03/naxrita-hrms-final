version: "3.9"

services:
  exam-portal-backend:
    build: ./backend
    container_name: flask_backend
    restart: always
    ports:
      - "5001:5001"

  exam-portal-frontend:
    build: ./frontend
    container_name: react_frontend
    restart: always
    ports:
      - "3001:3001"
    depends_on:
      - exam-portal-backend